<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equity & Dividend Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card-bg: #161a1e; --text-main: #e3e6e8;
            --text-muted: #a0a7b1; --border: #2b3139; --success: #00f2a1; --danger: #ff4d6d; --warning: #ffb800;
            --accent: #3b82f6;
        }
        [data-theme="light"] {
            --bg: #f4f7f9; --card-bg: #ffffff; --text-main: #1e2329;
            --text-muted: #5e6673; --border: #dcdfe4; --success: #03a66d; --danger: #cf304a; --warning: #f0b90b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 110px; transition: all 0.3s ease; }
        
        .ticker-header-group { position: sticky; top: 0; z-index: 1000; background: var(--bg); width: 100%; height: 50px; border-bottom: 1px solid var(--border); }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        .header { text-align: center; margin: 25px 0; }
        .header h1 { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; text-transform: uppercase; }
        .header p { font-size: 0.65rem; color: var(--text-muted); font-weight: 600; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; max-width: 200px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:hover { border-color: var(--accent); }

        .sector-section { margin-bottom: 10px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .sector-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(0,0,0,0.05); }
        .sector-title { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; padding: 12px; background: var(--bg); }
        .expanded .grid { display: grid; }
        .sector-header .arrow { transition: transform 0.3s; font-size: 0.8rem; }
        .expanded .sector-header .arrow { transform: rotate(180deg); }

        .card { background: var(--card-bg); padding: 15px 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; position: relative; transition: 0.3s; }
        
        /* Ícone de Calendário de Dividendos */
        .dividend-badge { 
            position: absolute; top: 8px; right: 8px; font-size: 0.8rem; 
            background: rgba(0, 242, 161, 0.1); color: var(--success); 
            padding: 4px; border-radius: 6px; border: 1px solid var(--success);
            display: none; cursor: help;
        }

        .opp-div { animation: pulse-div 2s infinite; border-width: 2px; }
        .opp-val { animation: pulse-val 2s infinite; border-width: 2px; }

        @keyframes pulse-div { 0%, 100% { border-color: var(--warning); box-shadow: 0 0 5px var(--warning); } 50% { border-color: var(--success); } }
        @keyframes pulse-val { 0%, 100% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent); } 50% { border-color: #fff; } }

        .buy-label { font-size: 0.45rem; font-weight: 800; margin-bottom: 6px; display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
        
        .ticker-link { font-size: 0.9rem; font-weight: 800; color: var(--accent); text-decoration: none; display: block; }
        .asset-name { font-size: 0.55rem; color: var(--text-muted); font-weight: 600; display: block; margin: 4px 0 8px 0; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; display: block; }
        
        .variation-row { font-size: 0.65rem; font-weight: 700; display: flex; gap: 5px; align-items: center; justify-content: center; margin-bottom: 10px; }
        .up { color: var(--success); } .down { color: var(--danger); }

        .info-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
        .info-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .info-label { font-size: 0.45rem; color: var(--text-muted); font-weight: 700; }
        .info-value { font-size: 0.6rem; font-weight: 800; }

        .market-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: var(--card-bg); border-top: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .sentiment-container { width: 80%; max-width: 300px; height: 8px; background: #333; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .sentiment-bar { height: 100%; width: 50%; background: linear-gradient(90deg, var(--danger), var(--warning), var(--success)); transition: width 1s ease-in-out; }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr 1fr !important; gap: 8px; padding: 8px; }
            .header h1 { font-size: 1.1rem; }
            .sector-header { padding: 12px 15px; }
            .btn { font-size: 0.55rem; padding: 8px; }
        }
    </style>
</head>
<body id="mainBody">

<div class="ticker-header-group">
    <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {"symbols": [{"proName": "BMFBOVESPA:IBOV", "title": "IBOV"},{"proName": "FX_IDC:USDBRL", "title": "USD/BRL"},{"proName": "BINANCE:BTCBRL", "title": "BTC"}],"showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "br"}
    </script></div>
</div>

<div class="container">
    <div class="header">
        <h1>Equity & Dividend Analytics</h1>
        <p>Monitoramento Estratégico de Ativos e Geração de Renda</p>
    </div>
    
    <div class="btn-container">
        <button class="btn" onclick="toggleAll(true)">EXPANDIR TUDO</button>
        <button class="btn" onclick="toggleAll(false)">RECOLHER TUDO</button>
    </div>

    <div id="dashboard-content"></div>
</div>

<div class="market-footer">
    <div style="display: flex; gap: 15px; margin-bottom: 4px;">
        <a href="https://g1.globo.com/economia/" target="_blank" style="color:var(--text-muted); text-decoration:none; font-size:0.55rem; font-weight:700;">► G1 ECONOMIA</a>
        <a href="https://br.investing.com/" target="_blank" style="color:var(--text-muted); text-decoration:none; font-size:0.55rem; font-weight:700;">► INVESTING</a>
    </div>
    <div id="sentimentText" style="font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">SENTIMENTO: ANALISANDO...</div>
    <div class="sentiment-container"><div id="sentimentBar" class="sentiment-bar"></div></div>
    <div style="display: flex; gap: 8px; align-items: center;">
        <div id="dot" style="width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.2);"></div>
        <span id="statusText" style="font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px;">CARREGANDO...</span>
    </div>
</div>

<script>
    const API_TOKEN = 'nctccHqqPkRvTdxGsZeK2f';
    
    const config = { 
        "BBAS3": [31.00, 28.00], "ITUB4": [38.00, 32.50], "BBDC4": [18.50, 15.00], "SANB11": [32.00, 29.00], "BRIV4": [12.50, 10.80], "INBR32": [52.00, 15.00], "BBSE3": [36.00, 32.00], "CXSE3": [17.00, 14.50],
        "PETR4": [42.00, 36.50], "ELET3": [55.00, 48.00], "TAEE11": [37.00, 34.20], "TRPL4": [26.50, 23.80], "CPLE6": [11.00, 9.50],
        "SBSP3": [85.00, 72.00], "CSMG3": [22.00, 19.50], "SAPR11": [27.00, 24.00], "VIVT3": [48.00, 44.00], "TIMS3": [21.00, 18.50], "HYPE3": [40.00, 32.00],
        "VALE3": [78.00, 62.00], "PRIO3": [58.00, 42.00], "BRAP4": [26.00, 21.50], "KLBN11": [24.50, 21.00], "WEGE3": [54.00, 25.00], "CSNA3": [8.50, 7.20],
        "MXRF11": [10.50, 10.00], "HGLG11": [165.00, 150.00], "BTHF11": [10.50, 9.80], "RBRR11": [98.00, 92.00], "ALZR11": [122.00, 112.00], "RBRP11": [72.00, 62.00], "VRTA11": [98.00, 91.00], "PCIP11": [96.00, 89.50], "XPLG11": [110.00, 102.00], "KNIP11": [100.00, 94.00],
        "ABEV3": [16.50, 13.50], "MGLU3": [12.00, 8.00], "RENT3": [52.00, 44.00], "LREN3": [22.00, 16.50], "IVVB11": [310.00, 240.00]
    };

    const sectors = {
        "Bancos & Seguros": { "BBAS3": "Banco do Brasil", "ITUB4": "Itaú Unibanco", "BBDC4": "Bradesco", "SANB11": "Santander Brasil", "BRIV4": "Banrisul", "INBR32": "Banco Inter", "BBSE3": "BB Seguridade", "CXSE3": "Caixa Seguridade" },
        "Energia & Elétricas": { "PETR4": "Petrobras", "ELET3": "Eletrobras", "TAEE11": "Taesa", "TRPL4": "ISA CTEEP", "CPLE6": "Copel" },
        "Saúde & Infra": { "SBSP3": "Sabesp", "CSMG3": "Copasa", "SAPR11": "Sanepar", "VIVT3": "Vivo", "TIMS3": "TIM Brasil", "HYPE3": "Hypera Pharma" },
        "Commodities & Indústria": { "VALE3": "Vale S.A.", "PRIO3": "PetroRio", "BRAP4": "Bradespar", "KLBN11": "Klabin", "WEGE3": "WEG S.A.", "CSNA3": "Siderúrgica Nacional" },
        "FIIs & Imobiliário": { "MXRF11": "Maxi Renda", "HGLG11": "CSHG Log", "BTHF11": "BTG Hedge", "RBRR11": "RBR Rendimento", "ALZR11": "Alianza Trust", "RBRP11": "RBR Properties", "VRTA11": "Fator Veritá", "PCIP11": "Pátria Crédito", "XPLG11": "XP Log", "KNIP11": "Kinea Índices" },
        "Varejo & Consumo": { "ABEV3": "Ambev", "MGLU3": "Magalu", "RENT3": "Localiza","LREN3": "Lojas Renner"},
        "Índices & Internacionais": { "IVVB11": "S&P 500 (IVVB11)"}
    };

    function applyTheme() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 18) {
            document.body.setAttribute('data-theme', 'light');
        } else {
            document.body.removeAttribute('data-theme');
        }
    }

    async function render() {
        const container = document.getElementById('dashboard-content');
        container.innerHTML = "";
        let totalVar = 0, count = 0;

        for (const [name, list] of Object.entries(sectors)) {
            const id = name.replace(/\s/g, '').replace('&', '');
            const size = Object.keys(list).length;
            
            container.innerHTML += `
                <div class="sector-section" id="sec-${id}">
                    <div class="sector-header" onclick="toggleSector('${id}')">
                        <span class="sector-title">${name} (${size})</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="grid" id="${id}"></div>
                </div>`;
            
            const grid = document.getElementById(id);
            for (const ticker in list) {
                try {
                    // Adicionado parâmetro dividends=true para capturar proventos
                    const res = await fetch(`https://brapi.dev/api/quote/${ticker}?dividends=true&token=${API_TOKEN}`);
                    const data = await res.json();
                    const asset = data.results[0];
                    const preco = asset.regularMarketPrice;
                    const valAlvo = config[ticker][0];
                    const divTeto = config[ticker][1];
                    
                    const isDivOpp = preco <= divTeto;
                    const isValOpp = preco <= valAlvo && !isDivOpp;
                    const isUp = asset.regularMarketChangePercent >= 0;

                    // Lógica do Contador de Dividendos (Data Com próxima)
                    let hasDividendSoon = false;
                    let divInfo = "";
                    if (asset.dividendsData && asset.dividendsData.cashDividends) {
                        const today = new Date();
                        const nextMonth = new Date();
                        nextMonth.setDate(today.getDate() + 30);

                        hasDividendSoon = asset.dividendsData.cashDividends.some(d => {
                            const lastDate = new Date(d.lastDatePriorEx);
                            return lastDate >= today && lastDate <= nextMonth;
                        });
                        
                        if(hasDividendSoon) {
                             const nextDiv = asset.dividendsData.cashDividends.find(d => new Date(d.lastDatePriorEx) >= today);
                             divInfo = `Data Com: ${new Date(nextDiv.lastDatePriorEx).toLocaleDateString('pt-BR')}`;
                        }
                    }

                    totalVar += asset.regularMarketChangePercent; count++;

                    grid.innerHTML += `
                        <div class="card ${isDivOpp ? 'opp-div' : (isValOpp ? 'opp-val' : '')}">
                            <div class="dividend-badge" style="display: ${hasDividendSoon ? 'block' : 'none'}" title="${divInfo}">📅</div>
                            <span class="buy-label" style="color: ${isDivOpp ? 'var(--warning)' : (isValOpp ? 'var(--accent)' : 'transparent')}">
                                ${isDivOpp ? '🛒 OPORTUNIDADE DIVIDENDOS' : (isValOpp ? '🚀 FOCO EM VALORIZAÇÃO' : '&nbsp;')}
                            </span>
                            <a href="https://www.google.com/finance/quote/${ticker}:BVMF" target="_blank" class="ticker-link">${ticker}</a>
                            <span class="asset-name">${list[ticker]}</span>
                            <span class="price">R$ ${preco.toFixed(2)}</span>
                            <div class="variation-row ${isUp ? 'up' : 'down'}">
                                <span>${isUp ? '▲' : '▼'}${asset.regularMarketChangePercent.toFixed(1)}%</span>
                                <span style="opacity:0.3">|</span>
                                <span>R$ ${Math.abs(asset.regularMarketChange).toFixed(2)}</span>
                            </div>
                            <div class="info-box">
                                <div class="info-line"><span class="info-label">TARGET VALORIZAÇÃO:</span><span class="info-value" style="color:var(--accent)">R$ ${valAlvo.toFixed(2)}</span></div>
                                <div class="info-line"><span class="info-label">PREÇO TETO DIV:</span><span class="info-value" style="color:var(--warning)">R$ ${divTeto.toFixed(2)}</span></div>
                            </div>
                        </div>`;
                } catch(e) {}
            }
        }
        updateSentiment(totalVar / count);
    }

    function toggleSector(id) {
        const sec = document.getElementById('sec-' + id);
        const grid = document.getElementById(id);
        const isHidden = grid.style.display === 'none' || grid.style.display === '';
        
        grid.style.display = isHidden ? 'grid' : 'none';
        isHidden ? sec.classList.add('expanded') : sec.classList.remove('expanded');
    }

    function toggleAll(exp) {
        document.querySelectorAll('.sector-section').forEach(sec => {
            const grid = sec.querySelector('.grid');
            grid.style.display = exp ? 'grid' : 'none';
            exp ? sec.classList.add('expanded') : sec.classList.remove('expanded');
        });
    }

    function updateSentiment(avg) {
        const score = Math.max(5, Math.min(95, 50 + (avg * 15)));
        document.getElementById('sentimentBar').style.width = `${score}%`;
        const text = document.getElementById('sentimentText');
        if (score < 40) text.innerText = "SENTIMENTO: MEDO (HORA DE COMPRAR)";
        else if (score > 60) text.innerText = "SENTIMENTO: GANÂNCIA (HORA DE CAUTELA)";
        else text.innerText = "SENTIMENTO: MERCADO NEUTRO";
    }

    function updateClock() {
        const now = new Date();
        const isOpen = (now.getDay() >= 1 && now.getDay() <= 5) && (now.getHours() >= 10 && now.getHours() < 18);
        document.getElementById('dot').style.background = isOpen ? '#00f2a1' : '#ff4d6d';
        document.getElementById('statusText').innerText = `BOLSA ${isOpen ? 'ABERTA' : 'FECHADA'} | ${now.toLocaleTimeString('pt-BR')}`;
    }

    applyTheme();
    render();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
